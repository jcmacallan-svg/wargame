<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Open War Game Engine v17 - Player Weather</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<header>
  <h1>Open War Game Engine v17</h1>
  <div class="small">Short-range weather outlook with reliability markings</div>
  <div class="row" style="margin-top:10px;align-items:flex-end;flex-wrap:wrap">
    <div style="min-width:240px;max-width:320px">
      <label class="small" for="playerCellSelect">Cell</label>
      <select id="playerCellSelect"></select>
    </div>
    <a id="playerScenarioNavLink" class="nav-btn" href="./player-scenario.html">Scenario</a>
    <a id="playerNavigationNavLink" class="nav-btn" href="./player-navigation.html">Navigation</a>
    <a id="playerOpsNavLink" class="nav-btn" href="./player-ops.html">Ops / Action</a>
    <a id="playerStatusNavLink" class="nav-btn" href="./player-status.html">Status Update</a>
    <a id="playerWeatherNavLink" class="nav-btn" href="./player-weather.html">Weather Forecast</a>
    <a id="playerMapNavLink" class="nav-btn" href="./player.html">Full Map</a>
  </div>
  <div id="turnCounterBadge" class="turn-badge" aria-label="Current turn status"></div>
</header>
<div class="ops-container player-page-scroll">
  <div class="panel">
    <h2>Weather Forecast</h2>
    <div id="playerWeatherPanel"></div>
  </div>
  <div class="panel">
    <h2>Current Situation</h2>
    <div id="playerScenarioPanel"></div>
  </div>
</div>
<script src="./app.js"></script>
</body>
</html>
