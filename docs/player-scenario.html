<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Open War Game Engine v16 - Player Scenario</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<header>
  <h1>Open War Game Engine v16</h1>
  <div class="small">Player scenario briefing and locked cell overview</div>
  <div class="row" style="margin-top:10px"><a id="playerScenarioNavLink" class="nav-btn" href="./player-scenario.html">Player Scenario</a><a id="playerOpsNavLink" class="nav-btn" href="./player-ops.html">Player Ops</a><a id="playerMapNavLink" class="nav-btn" href="./player.html">Player Map</a></div>
  <div id="turnCounterBadge" class="turn-badge" aria-label="Current turn status"></div>
</header>
<div class="ops-container">
  <div class="panel">
    <h2>Cell</h2>
    <select id="playerCellSelect"></select>
    <div class="small" style="margin-top:8px">Choose your cell once. After selection, that cell is locked to this player session and cannot be picked by another player at the same time.</div>
    <div id="playerScenarioPanel"></div>
  </div>
  <div class="panel">
    <h2>Assigned Assets Snapshot</h2>
    <div id="playerAssetsPanel"></div>
  </div>
</div>
<script src="./app.js"></script>
</body>
</html>
