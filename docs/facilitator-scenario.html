<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Open War Game Engine v16 - Scenario</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<header>
  <h1>Open War Game Engine v16</h1>
  <div class="small">Facilitator scenario briefing and scenario state overview</div>
  <div class="row" style="margin-top:10px"><a class="nav-btn" href="./facilitator-scenario.html">Scenario</a><a class="nav-btn" href="./facilitator-ops.html">Facilitator Ops / Injects</a><a class="nav-btn" href="./index.html">Map / Authoring</a></div>
  <div id="turnCounterBadge" class="turn-badge" aria-label="Current turn status"></div>
</header>
<div class="ops-container">
  <div class="panel">
    <h2>Scenario State</h2>
    <div id="scenarioPanel"></div>

    <h2 style="margin-top:18px">Scenario Authoring</h2>
    <input id="scenarioNameInput" placeholder="Scenario name">
    <textarea id="scenarioOverviewInput" placeholder="Scenario overview"></textarea>
    <textarea id="scenarioSituationInput" placeholder="Current situation / authoring notes"></textarea>
    <div class="row" style="margin-top:12px">
      <button id="saveScenarioMetaBtn" class="good">Save Scenario Meta</button>
      <button id="newBlankScenarioBtn" class="secondary">New Blank Scenario</button>
    </div>

    <h2 style="margin-top:18px">Scenario Templates</h2>
    <select id="templateSelect"></select>

    <h2 style="margin-top:18px">Scenario / Exercise Packages</h2>
    <button id="savePackageBtn" class="good">Save Scenario Package</button>
    <input id="loadPackageInput" type="file" accept=".json">
  </div>
  <div class="panel">
    <h2>Timeline</h2>
    <div id="timelinePanel"></div>
  </div>
</div>
<script src="./app.js"></script>
</body>
</html>
