<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Open War Game Engine v16 - Player Map</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<header>
  <h1>Open War Game Engine v16</h1>
  <div class="small">Player map view with shared chart picture and assigned-asset awareness</div>
  <div class="row" style="margin-top:10px"><a id="playerMapNavLink" class="nav-btn" href="./player.html">Player Map</a><a id="playerOpsNavLink" class="nav-btn" href="./player-ops.html">Player Ops</a></div>
</header>
<div class="player-container">
  <div class="panel">
    <h2>Cell</h2>
    <select id="playerCellSelect"></select>
    <div class="small" style="margin-top:8px">Choose your cell once. After selection, that cell is locked to this player session and cannot be picked by another player at the same time.</div>
    <div id="playerScenarioPanel"></div>
    <h2 style="margin-top:18px">Assigned Assets</h2>
    <div id="playerAssetsPanel"></div>
  </div>
  <div class="panel">
    <h2>Player Map</h2>
    <div id="playerMap"></div>
  </div>
</div>
<script src="./app.js"></script>
</body>
</html>
